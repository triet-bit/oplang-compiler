version: '3.8'

services:
  redis:
    image: redis:alpine
    container_name: oplang_redis
    ports:
      - "6379:6379"
    restart: always
  web:
    build: .
    container_name: oplang_web
    command: uvicorn service.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    depends_on:
      - redis
    environment:
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - .:/app
      - /app/build
      - /app/src/runtime
      - /app/temp_jobs
      - /app/__pycache__
    restart: always

  worker:
    build: .
    container_name: oplang_worker
    command: celery -A service.tasks worker --loglevel=info
    depends_on:
      - redis
    environment:
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - .:/app
      - /app/build
      - /app/src/runtime
      - /app/temp_jobs
      - /app/__pycache__
    restart: always